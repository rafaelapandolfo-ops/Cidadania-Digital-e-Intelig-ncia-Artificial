<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuro Premium - Dashboard</title>
    
    <!-- Link para o arquivo CSS (substitua pelo seu caminho real se necessário) -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Main indica o conteúdo principal da página para os motores de busca -->
    <main aria-label="Conteúdo Principal">
        
        <!-- Cartão de interface moderno -->
        <article class="card-premium">
            <h1>Construa Seu Futuro</h1>
            <p>Uma interface otimizada com código limpo, alta performance e design focado na experiência do usuário.</p>
            
            <!-- Botão com acessibilidade para leitores de tela -->
            <button class="btn-neon" type="button" aria-live="polite">
                Iniciar Jornada
            </button>
        </article>

    </main>

    <!-- Link para o arquivo JavaScript inserido no final para não travar o carregamento da página -->
    <script src="script.js"></script>
</body>
</html>
