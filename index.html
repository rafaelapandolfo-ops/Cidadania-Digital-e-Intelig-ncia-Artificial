<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universo Neon - O Quiz do Seu Futuro</title>
    
    <style>
        /* 🎨 IDENTIDADE VISUAL PREMUM (PRETO E ROXO NEON) */
        :root {
          --bg-dark: #08070d;       /* Preto profundo de fundo */
          --bg-card: #141226;       /* Roxo escuro para os blocos */
          --purple-neon: #9d4edd;   /* Roxo vibrante */
          --purple-glow: #bd93f9;   /* Roxo claro para destaques */
          --text-main: #f8f9fa;     /* Branco para leitura */
          --text-muted: #9a9fac;    /* Cinza sutil */
          --success: #00f5d4;       /* Verde neon para acertos */
        }

        body {
          margin: 0;
          padding: 20px;
          box-sizing: border-box;
          font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          background-color: var(--bg-dark);
          color: var(--text-main);
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
        }

        /* CONTAINER PRINCIPAL DO SITE */
        .container {
          background: var(--bg-card);
          padding: 40px;
          border-radius: 24px;
          border: 1px solid rgba(157, 78, 221, 0.25);
          box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), 
                      0 0 60px rgba(157, 78, 221, 0.08);
          max-width: 500px;
          width: 100%;
          text-align: center;
          backdrop-filter: blur(12px);
        }

        header h1 {
          font-size: 32px;
          font-weight: 800;
          margin: 0 0 10px 0;
          letter-spacing: -0.5px;
          background: linear-gradient(135deg, #fff, var(--purple-glow));
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }

        header p {
          color: var(--text-muted);
          font-size: 15px;
          line-height: 1.6;
          margin-bottom: 35px;
        }

        /* ÁREA DO QUIZ */
        .quiz-box {
          text-align: left;
        }

        .question-text {
          font-size: 18px;
          font-weight: 600;
          margin-bottom: 20px;
          line-height: 1.4;
        }

        /* OPÇÕES DE RESPOSTA */
        .options-list {
          display: flex;
          flex-direction: column;
          gap: 12px;
          margin-bottom: 30px;
        }

        .option-btn {
          background: rgba(8, 7, 13, 0.6);
          color: var(--text-main);
          border: 1px solid rgba(157, 78, 221, 0.2);
          padding: 16px 20px;
          font-size: 15px;
          font-weight: 500;
          border-radius: 12px;
          cursor: pointer;
          text-align: left;
          transition: all 0.25s ease;
        }

        .option-btn:hover {
          border-color: var(--purple-glow);
          background: rgba(157, 78, 221, 0.1);
          transform: translateX(4px);
        }

        /* Estado Selecionado */
        .option-btn.selected {
          border-color: var(--purple-neon);
          background: var(--purple-neon);
          box-shadow: 0 0 15px rgba(157, 78, 221, 0.4);
        }

        /* BOTÃO AVANÇAR */
        .action-btn {
          background: var(--purple-neon);
          color: var(--text-main);
          border: none;
          padding: 16px;
          font-size: 16px;
          font-weight: 600;
          border-radius: 12px;
          cursor: pointer;
          width: 100%;
          transition: all 0.3s ease;
          box-shadow: 0 4px 15px rgba(157, 78, 221, 0.3);
        }

        .action-btn:hover {
          background: var(--purple-glow);
          box-shadow: 0 0 25px rgba(189, 147, 249, 0.5);
        }

        .action-btn:disabled {
          background: #2b283d;
          color: var(--text-muted);
          box-shadow: none;
          cursor: not-allowed;
        }

        /* TELA DE RESULTADOS */
        .results-screen {
          display: none;
          animation: scaleUp 0.4s ease forwards;
        }

        .score-badge {
          font-size: 48px;
          font-weight: 800;
          color: var(--success);
          margin: 20px 0;
          text-shadow: 0 0 20px rgba(0, 245, 212, 0.4);
        }

        @keyframes scaleUp {
          from { opacity: 0; transform: scale(0.95); }
          to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <main class="container">
        <!-- Tela de Perguntas -->
        <div id="quiz-window">
            <header>
                <h1>Desafio do Futuro</h1>
                <p>Responda às questões com sabedoria para medir sua prontidão tecnológica.</p>
            </header>

            <section class="quiz-box">
                <div class="question-text" id="question-title">Carregando pergunta...</div>
                
                <div class="options-list" id="options-container">
                    <!-- Gerado via Javascript -->
                </div>

                <button class="action-btn" id="next-btn" disabled>Avançar Questão</button>
            </section>
        </div>

        <!-- Tela Final de Pontuação -->
        <div id="results-window" class="results-screen">
            <h1>Quiz Concluído! 🚀</h1>
            <p>Seu desempenho foi calculado com sucesso no sistema.</p>
            <div class="score-badge" id="score-text">0/0</div>
            <p id="feedback-text">Analisando resultados...</p>
            <button class="action-btn" onclick="location.reload()" style="margin-top: 20px;">Refazer Desafio</button>
        </div>
    </main>

    <!-- ⚡ LOGICA DO QUIZ EM JAVASCRIPT -->
    <script>
        // Banco de dados de perguntas do Quiz
        const quizData = [
            {
                question: "Qual das alternativas representa a melhor prática para vincular códigos em um site de alta performance?",
                options: [
                    "Colocar tudo espalhado sem ordem", 
                    "Usar arquivos integrados ou caminhos perfeitamente validados", 
                    "Não usar JavaScript no navegador", 
                    "Deixar telas brancas propositalmente"
                ],
                correct: 1
            },
            {
                question: "O que o termo 'Modo Escuro' (Dark Mode) prioriza além da estética bonita?",
                options: [
                    "Gasto excessivo de energia", 
                    "Dificuldade de leitura no escuro", 
                    "Conforto visual do usuário e economia de bateria", 
                    "Apenas carregar imagens mais rápido"
                ],
                correct: 2
            },
            {
                question: "Qual elemento traz a interatividade em tempo real para as páginas da Web?",
                options: [
                    "Apenas o arquivo HTML puro", 
                    "O banco de dados SQL isolado", 
                    "Imagens estáticas de fundo", 
                    "O motor JavaScript rodando no navegador"
                ],
                correct: 3
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let selectedOptionIndex = null;

        const questionTitle = document.getElementById('question-title');
        const optionsContainer = document.getElementById('options-container');
        const nextButton = document.getElementById('next-btn');
        const quizWindow = document.getElementById('quiz-window');
        const resultsWindow = document.getElementById('results-window');
        const scoreText = document.getElementById('score-text');
        const feedbackText = document.getElementById('feedback-text');

        function loadQuestion() {
            // Limpa seleções anteriores
            selectedOptionIndex = null;
            nextButton.disabled = true;
            nextButton.textContent = currentQuestionIndex === quizData.length - 1 ? "Finalizar Quiz" : "Avançar Questão";
            optionsContainer.innerHTML = '';

            const currentData = quizData[currentQuestionIndex];
            questionTitle.textContent = `${currentQuestionIndex + 1}. ${currentData.question}`;

            // Renderiza as alternativas bonitas
            currentData.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.classList.add('option-btn');
                button.textContent = option;
                button.type = 'button';
                
                button.addEventListener('click', () => {
                    // Remove seleção dos outros botões
                    document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
                    // Seleciona o atual
                    button.classList.add('selected');
                    selectedOptionIndex = index;
                    nextButton.disabled = false;
                });

                optionsContainer.appendChild(button);
            });
        }

        nextButton.addEventListener('click', () => {
            if (selectedOptionIndex === null) return;

            // Valida se acertou
            if (selectedOptionIndex === quizData[currentQuestionIndex].correct) {
                score++;
            }

            currentQuestionIndex++;

            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        });

        function showResults() {
            quizWindow.style.display = 'none';
            resultsWindow.style.display = 'block';
            scoreText.textContent = `${score} / ${quizData.length}`;
            
            if (score === quizData.length) {
